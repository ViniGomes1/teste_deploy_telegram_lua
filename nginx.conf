worker_processes 1;

events { worker_connections 1024; }

http {
    server {
        listen $PORT;  # Render define a porta via variável de ambiente

        location /webhook {
            content_by_lua_block {
                local cjson = require("cjson")
                local bot_handler = require("bot")

                -- Lê o body da requisição
                ngx.req.read_body()
                local body = ngx.req.get_body_data()

                if body then
                    local ok, update = pcall(cjson.decode, body)
                    if ok then
                        bot_handler.process_update(update)
                    end
                end

                ngx.status = 200
                ngx.say("OK")
            }
        }
    }
}