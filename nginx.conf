worker_processes 1;

env TELEGRAM_TOKEN;
env SPLASH_URL;

events { worker_connections 1024; }

http {
    lua_package_path "/app/?.lua;/app/?/?.lua;;";

    server {
        listen $PORT;  # Render define a porta via variável de ambiente

        location /webhook {
            resolver 8.8.8.8 ipv6=off;
            content_by_lua_block {
                local cjson = require("cjson")

                -- Carrega o bot com tratamento de erro
                local ok, handler = pcall(require, "bot")
                if not ok then
                    ngx.log(ngx.ERR, "Erro ao carregar bot.lua: ", handler)
                    ngx.status = 500
                    ngx.say("Erro interno: " .. tostring(handler))
                    return
                end

                ngx.req.read_body()
                local body = ngx.req.get_body_data()

                if body then
                    local ok2, update = pcall(cjson.decode, body)
                    if ok2 then
                        local ok3, err = pcall(handler.process_update, update)
                        if not ok3 then
                            ngx.log(ngx.ERR, "Erro no process_update: ", err)
                        end
                    end
                end

                ngx.status = 200
                ngx.say("OK")
            }
        }
    }
}