version: '3.8'
services:
  splash:
    image: scrapinghub/splash
    ports:
      - "8050:8050"

  meu-app-lua:
    build: .
    depends_on:
      - splash
    environment:
      - SPLASH_URL=http://splash:8050
    volumes:
      - .:/app
    working_dir: /app
    tty: true  # Permite que o container fique aberto para interação
    command: lua ScappingClasses/AmazonScrapinClass.lua